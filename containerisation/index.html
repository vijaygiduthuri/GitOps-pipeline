<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitOps Demo — Deployed via ArgoCD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    body {
      background: linear-gradient(-45deg, #2b5876, #4e4376, #ee0979, #ff6a00);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 50px 60px;
      max-width: 720px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      animation: fadeUp 1.2s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rocket {
      font-size: 72px;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-15px); }
    }

    h1 {
      font-size: 2.4rem;
      margin: 20px 0 10px;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    h1 .accent {
      background: linear-gradient(90deg, #ffd86f, #fc6262);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.sub {
      font-size: 1.05rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .badge {
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-size: 0.9rem;
      font-weight: 500;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .badge:nth-child(2) { animation-delay: 0.3s; }
    .badge:nth-child(3) { animation-delay: 0.6s; }
    .badge:nth-child(4) { animation-delay: 0.9s; }
    .badge:nth-child(5) { animation-delay: 1.2s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
      50%      { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(255, 255, 255, 0); }
    }

    .flow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .flow span.step {
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
    }

    .flow .arrow { opacity: 0.7; }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      opacity: 0.65;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="rocket">🚀</div>
    <h1>Deployed on <span class="accent">Kind K8s Cluster</span><br/>using ArgoCD</h1>
    <p class="sub">A complete GitOps pipeline — from a Git commit to a running pod, automatically.</p>

    <div class="stack">
      <span class="badge">🐳 Docker</span>
      <span class="badge">☸️ Kubernetes (kind)</span>
      <span class="badge">🐙 GitHub</span>
      <span class="badge">🔄 ArgoCD</span>
      <span class="badge">☁️ AWS EC2</span>
    </div>

    <div class="flow">
      <span class="step">git push</span>
      <span class="arrow">➜</span>
      <span class="step">GitHub</span>
      <span class="arrow">➜</span>
      <span class="step">ArgoCD sync</span>
      <span class="arrow">➜</span>
      <span class="step">kind cluster</span>
      <span class="arrow">➜</span>
      <span class="step">you 👀</span>
    </div>

    <footer>PHASE 2 · CUSTOM IMAGE · GITOPS</footer>
  </div>
</body>
</html>
